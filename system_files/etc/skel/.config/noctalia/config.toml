[bar.default]
concave_edge_corners = false
margin_ends = 0
position = "bottom"
radius = 0
start = [ "launcher", "wallpaper", "workspaces", "taskbar" ]

[dock]
cross_axis_padding = 0
icon_size = 16
inactive_opacity = 0.84999998100101948
inactive_scale = 1.0
launcher_position = "start"
main_axis_padding = 0
margin_edge = 5
radius = 0
show_dots = true

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@Virtual-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@Virtual-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 640.0
    cy = 681.0
    output = "Virtual-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@Virtual-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[shell]
corner_radius_scale = 0.0
polkit_agent = true
ui_scale = 0.85000000521540642

    [shell.panel]
    borders = false
    floating_offset = 0
    launcher_position = "bottom_center"

[theme]
builtin = "Catppuccin"
community_palette = "Oxocarbon"
mode = "dark"
source = "builtin"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "kitty", "qt" ]
    community_ids = [ "neovim" ]
